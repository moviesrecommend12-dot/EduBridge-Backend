{% extends 'dashboard/base.html' %}

{% block title %}{{ page_title }}{% endblock %}
{% block page_title %}{{ page_title }}{% endblock %}

{% block content %}
<div class="form-card">
    <form method="post">
        {% csrf_token %}

        {% for field in form %}
        <div class="form-group">
            <label for="{{ field.id_for_label }}">
                {{ field.label }}
            </label>

            {{ field }}

            {% if field.errors %}
            <div class="field-errors">
                {{ field.errors }}
            </div>
            {% endif %}
        </div>
        {% endfor %}

        <div class="form-actions">
            <button type="submit" class="primary-button">
                {{ button_text }}
            </button>

            <a href="{% url 'dashboard:classroom-list' %}" class="secondary-button">
                إلغاء
            </a>
        </div>
    </form>
</div>
{% endblock %}
